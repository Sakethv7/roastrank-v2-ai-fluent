<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
  <meta charset="UTF-8">
  <title>RoastRank v2 — AI Limitations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="/static/starfield.js"></script>
  <style>
    body { font-family: 'Roboto Mono', monospace; }
    #starfield { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    /* Markdown-ish styling */
    .md-content h1 { font-size: 1.6rem; font-weight: 900; color: #fbbf24; margin: 1.5rem 0 0.5rem; }
    .md-content h2 { font-size: 1.2rem; font-weight: 700; color: #d1d5db; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #374151; padding-bottom: 0.3rem; }
    .md-content h3 { font-size: 1rem; font-weight: 700; color: #9ca3af; margin: 1rem 0 0.25rem; }
    .md-content p  { color: #d1d5db; margin: 0.5rem 0; line-height: 1.7; font-size: 0.85rem; }
    .md-content ul { list-style: disc; padding-left: 1.5rem; color: #9ca3af; font-size: 0.85rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.2rem 0; }
    .md-content blockquote { border-left: 3px solid #fbbf24; padding-left: 1rem; color: #fbbf24; font-size: 0.8rem; margin: 0.75rem 0; }
    .md-content code { background: #1f2937; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.8rem; color: #86efac; }
    .md-content table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin: 0.75rem 0; }
    .md-content th { background: #1f2937; color: #f9fafb; padding: 0.4rem 0.75rem; text-align: left; }
    .md-content td { border-top: 1px solid #374151; padding: 0.4rem 0.75rem; color: #9ca3af; }
    .md-content hr { border-color: #374151; margin: 1.5rem 0; }
    .md-content strong { color: #f3f4f6; }
    .md-content a { color: #fbbf24; text-decoration: underline; }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>

  <main class="relative z-10 max-w-2xl mx-auto px-6 pt-16 pb-28">

    <!-- DILIGENCE: Disclosure badge -->
    <div class="mb-6 bg-red-900/20 border border-red-700/40 rounded-lg px-4 py-3 text-xs text-red-300">
      <p class="font-bold mb-1">DILIGENCE — Transparency Document</p>
      <p>This page is part of the 4D Framework's Diligence competency: honest disclosure of what this AI system can and cannot do. Read before acting on any scores.</p>
    </div>

    <!-- Render markdown content as styled HTML -->
    <div class="md-content space-y-1" id="mdContent">
      <!-- populated by JS below from raw content -->
    </div>

    <div class="mt-10 text-center">
      <a href="/" class="underline hover:text-yellow-300 text-sm">← Back home</a>
    </div>

  </main>

  <script>
    // Minimal client-side markdown renderer for the LIMITATIONS.md content
    const raw = {{ content | tojson }};

    function mdToHtml(text) {
      return text
        .replace(/^### (.+)$/gm,   '<h3>$1</h3>')
        .replace(/^## (.+)$/gm,    '<h2>$1</h2>')
        .replace(/^# (.+)$/gm,     '<h1>$1</h1>')
        .replace(/^> (.+)$/gm,     '<blockquote>$1</blockquote>')
        .replace(/^---$/gm,        '<hr>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g,     '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        // Tables
        .replace(/^\|(.+)\|$/gm, (_, row) => {
          const cells = row.split('|').map(c => c.trim());
          const isHeader = false;
          return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        })
        // Bullet lists
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, match => `<ul>${match}</ul>`)
        // Paragraphs (lines that aren't already tags)
        .replace(/^(?!<)((?!\n).+)$/gm, '<p>$1</p>');
    }

    document.getElementById('mdContent').innerHTML = mdToHtml(raw);
    window.onload = () => startStarfield();
  </script>
</body>
</html>
