name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a manual re-sync from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://Sakethv7:$HF_TOKEN@huggingface.co/spaces/Sakethv7/roastrank-v2-ai-fluent main --force
